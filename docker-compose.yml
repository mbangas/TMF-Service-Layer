version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tmf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tmf_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    container_name: tmf_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tmf_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-docker}
      APP_ENV: ${APP_ENV:-development}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload in development
      - ./src:/app/src:ro
      # Mount frontend and alembic so new files are picked up without a rebuild
      - ./frontend:/app/frontend:ro
      - ./alembic:/app/alembic:ro
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
